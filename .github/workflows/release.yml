name: Release

# 推送 v* 的 tag（例如 v4.8.2）時觸發：
# 自動打包 Windows 安裝檔，並直接「公開發布」到 GitHub Releases，附自動產生的 release note。
on:
  push:
    tags:
      - 'v*'

# 讓內建的 GITHUB_TOKEN 有權限建立 / 更新 Release
permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v3
        # 模型檔 assets/model.onnx 由 Git LFS 管理，必須拉下真正的檔案內容；
        # 預設的 checkout 只會抓到 130 bytes 的 LFS 指標檔，導致打包出來的安裝檔
        # 內含假模型，安裝後智能辨識會報「Protobuf parsing failed」。
        with:
          lfs: true

      # 防呆：確認 model.onnx 是真正的模型（約 411MB），而非 LFS 指標檔。
      # 若 LFS 沒拉成功（例如頻寬用罄），直接讓 release 失敗，避免再次出貨壞檔。
      - name: Verify model.onnx is a real model (not an LFS pointer)
        shell: bash
        run: |
          SIZE=$(stat -c%s assets/model.onnx 2>/dev/null || stat -f%z assets/model.onnx)
          echo "assets/model.onnx size: ${SIZE} bytes"
          if [ "${SIZE}" -lt 104857600 ]; then
            echo "::error::model.onnx 只有 ${SIZE} bytes，Git LFS 內容未正確拉取，中止發布。"
            exit 1
          fi

      - name: Install Node.js and NPM
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: npm

      - name: npm install
        run: npm install

      # 以 tag 名稱（去掉前綴 v）作為打包版本，寫入 release/app/package.json
      - name: Set version from tag
        run: node .erb/scripts/set-release-version.js

      # clean + build + electron-builder --win --publish always
      # publish.releaseType=release → 直接建立「公開」Release（非草稿），
      # 附上 Setup.exe / .blockmap / latest.yml。
      - name: Build & publish Windows installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release

      # 用 GitHub API 產生 release note（自上次 release 以來的提交 / PR），寫回該 Release。
      - name: Generate release notes
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/releases/generate-notes" \
            -f tag_name="${{ github.ref_name }}" --jq '.body' > notes.md
          gh release edit "${{ github.ref_name }}" --notes-file notes.md --draft=false
