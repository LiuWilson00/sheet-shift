name: Release

# 推送 v* 的 tag（例如 v4.8.2）時觸發：
# 自動打包 Windows 安裝檔，並直接「公開發布」到 GitHub Releases，附自動產生的 release note。
on:
  push:
    tags:
      - 'v*'

# 讓內建的 GITHUB_TOKEN 有權限建立 / 更新 Release
permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v3

      - name: Install Node.js and NPM
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: npm

      - name: npm install
        run: npm install

      # 以 tag 名稱（去掉前綴 v）作為打包版本，寫入 release/app/package.json
      - name: Set version from tag
        run: node .erb/scripts/set-release-version.js

      # clean + build + electron-builder --win --publish always
      # publish.releaseType=release → 直接建立「公開」Release（非草稿），
      # 附上 Setup.exe / .blockmap / latest.yml。
      - name: Build & publish Windows installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release

      # 用 GitHub API 產生 release note（自上次 release 以來的提交 / PR），寫回該 Release。
      - name: Generate release notes
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/releases/generate-notes" \
            -f tag_name="${{ github.ref_name }}" --jq '.body' > notes.md
          gh release edit "${{ github.ref_name }}" --notes-file notes.md --draft=false
